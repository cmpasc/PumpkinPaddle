<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Single Page</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      line-height: 1.6;
    }

    header {
      background: #333;
      color: #fff;
      padding: 1rem;
      position: sticky;
      top: 0;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1rem;
    }

    nav a {
      color: #fff;
      text-decoration: none;
    }

    .hero {
      background: #f4f4f4;
      padding: 4rem 1rem;
      text-align: center;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 2rem 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .card {
      background: #eee;
      padding: 1.5rem;
      border-radius: 8px;
    }

    footer {
      background: #333;
      color: #fff;
      text-align: center;
      padding: 1rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }

      nav {
        flex-direction: column;
        align-items: flex-start;
      }

      nav ul {
        flex-direction: column;
        width: 100%;
      }
    }
  </style>
</head>

<body>

<header>
  <nav>
    <h1>MySite</h1>
    <ul>
      <li><a href="#home">Home</a></li>
      <li><a href="#features">Features</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>
</header>

<section id="home" class="hero">
  <h2>Welcome</h2>
  <p>This is a simple responsive single-page website.</p>
</section>

<section id="features" class="container">
  <h2>Features</h2>
  <div class="grid">
    <div class="card">
      <h3>Fast</h3>
      <p>Lightweight and quick loading.</p>
    </div>
    <div class="card">
      <h3>Responsive</h3>
      <p>Works on all devices.</p>
    </div>
    <div class="card">
      <h3>Simple</h3>
      <p>Easy to customize.</p>
    </div>
  </div>
</section>

<section id="contact" class="container">
  <h2>Contact</h2>
  <p>Email: example@email.com</p>
</section>

<footer>
  <p>&copy; 2026 MySite</p>
</footer>

</body>
</html>
